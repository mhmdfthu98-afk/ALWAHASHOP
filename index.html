<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الواحة | متجر شحن الألعاب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- شاشة التحميل -->
    <div id="loading" class="fixed inset-0 bg-emerald-50 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-gray-600">جاري التحميل...</p>
            <p id="loadingStatus" class="text-sm text-gray-400 mt-2">جاري الاتصال بقاعدة البيانات...</p>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="app" class="hidden">
        <div class="bg-emerald-600 text-white p-4 text-center">
            <h1 class="text-2xl font-bold">🏝️ الواحة</h1>
            <p class="text-sm">متجر شحن الألعاب</p>
        </div>
        <div class="p-4 max-w-6xl mx-auto">
            <div id="authSection" class="bg-white rounded-2xl shadow-lg p-6 max-w-md mx-auto mt-10">
                <h2 class="text-2xl font-bold text-center text-emerald-700 mb-6">تسجيل الدخول</h2>
                <div id="errorMsg" class="hidden bg-red-100 text-red-700 p-3 rounded-xl mb-4 text-center"></div>
                <input id="loginEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-xl mb-3">
                <input id="loginPassword" type="password" placeholder="كلمة المرور" class="w-full p-3 border rounded-xl mb-3">
                <button id="loginBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700">تسجيل الدخول</button>
                <hr class="my-4">
                <button id="googleBtn" class="w-full bg-white border py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-gray-50">
                    <i class="fab fa-google"></i> دخول عبر جوجل
                </button>
                <p class="text-center mt-4 text-sm text-gray-500">
                    ليس لديك حساب؟ <a href="#" id="showRegister" class="text-emerald-600 font-bold">إنشاء حساب</a>
                </p>
            </div>

            <div id="registerSection" class="hidden bg-white rounded-2xl shadow-lg p-6 max-w-md mx-auto mt-10">
                <h2 class="text-2xl font-bold text-center text-emerald-700 mb-6">إنشاء حساب</h2>
                <input id="regName" type="text" placeholder="الاسم الكامل" class="w-full p-3 border rounded-xl mb-3">
                <input id="regEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-xl mb-3">
                <input id="regPassword" type="password" placeholder="كلمة المرور" class="w-full p-3 border rounded-xl mb-3">
                <button id="registerBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700">إنشاء حساب</button>
                <p class="text-center mt-4 text-sm text-gray-500">
                    لديك حساب؟ <a href="#" id="showLogin" class="text-emerald-600 font-bold">تسجيل الدخول</a>
                </p>
            </div>

            <div id="mainContent" class="hidden">
                <div id="userInfo" class="bg-white rounded-2xl shadow-lg p-4 mb-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold" id="userName">...</p>
                        <p class="text-sm text-gray-500">رصيد: <span id="userBalance" class="text-emerald-600 font-bold">0</span> ج.س</p>
                    </div>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm">تسجيل خروج</button>
                </div>

                <div id="servicesGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <!-- سيتم تعبئتها -->
                </div>

                <div id="adminPanel" class="hidden mt-6 bg-white rounded-2xl shadow-lg p-4">
                    <h3 class="font-bold text-emerald-700 mb-3">👑 لوحة الأدمن</h3>
                    <div class="flex flex-wrap gap-2 mb-3">
                        <button onclick="loadAdminData()" class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg text-sm">📊 تحديث</button>
                        <button onclick="showAddProduct()" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg text-sm">➕ إضافة منتج</button>
                    </div>
                    <div id="adminData" class="text-sm">
                        <p>👥 المستخدمين: <span id="totalUsers">0</span></p>
                        <p>📋 الطلبات المعلقة: <span id="pendingOrders">0</span></p>
                    </div>
                    <div id="addProductForm" class="hidden mt-3 space-y-2">
                        <input id="prodName" placeholder="اسم المنتج" class="w-full p-2 border rounded-lg">
                        <input id="prodPrice" type="number" placeholder="السعر" class="w-full p-2 border rounded-lg">
                        <select id="prodCategory" class="w-full p-2 border rounded-lg">
                            <option value="pubg">ببجي</option>
                            <option value="freefire">فري فاير</option>
                            <option value="clash">كلاش</option>
                            <option value="efootball">eFootball</option>
                            <option value="netflix">نتفليكس</option>
                            <option value="googleplay">جوجل بلاي</option>
                            <option value="tiktok">تيك توك</option>
                            <option value="ai">ذكاء اصطناعي</option>
                        </select>
                        <button onclick="addNewProduct()" class="w-full bg-emerald-600 text-white py-2 rounded-lg">إضافة</button>
                    </div>
                </div>

                <div id="ordersList" class="mt-6 space-y-3">
                    <!-- طلبات المستخدم -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================
        // Firebase - استيراد مباشر من CDN
        // ============================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, doc, setDoc, getDoc, getDocs,
            updateDoc, deleteDoc, query, where, orderBy,
            onSnapshot, increment, serverTimestamp, runTransaction 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ============================================
        // إعدادات Firebase
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBiIhF2PrNIhEZA4RO235F-3Y1nmIJiMOs",
            authDomain: "oasis-store-87d2d.firebaseapp.com",
            databaseURL: "https://oasis-store-87d2d-default-rtdb.firebaseio.com",
            projectId: "oasis-store-87d2d",
            storageBucket: "oasis-store-87d2d.firebasestorage.app",
            messagingSenderId: "128718200720",
            appId: "1:128718200720:web:a90e330c428cac1db2dd15"
        };

        // ============================================
        // تهيئة Firebase
        // ============================================
        let app, db, auth, provider;

        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            provider = new GoogleAuthProvider();
            document.getElementById('loadingStatus').textContent = '✅ تم الاتصال بقاعدة البيانات!';
            console.log('✅ Firebase initialized successfully');
        } catch (error) {
            document.getElementById('loadingStatus').textContent = '❌ خطأ: ' + error.message;
            console.error('❌ Firebase init error:', error);
        }

        // ============================================
        // المتغيرات العامة
        // ============================================
        const ADMIN_EMAIL = 'mhmdfthu98@gmail.com';
        let currentUser = null;

        // ============================================
        // دوال الإشعارات
        // ============================================
        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-20 right-4 p-4 rounded-xl shadow-lg z-50 max-w-sm ${type === 'error' ? 'bg-red-500' : 'bg-emerald-500'} text-white`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ============================================
        // دوال المنتجات
        // ============================================
        const CATEGORIES = {
            pubg: '🎮 ببجي',
            freefire: '🔥 فري فاير',
            clash: '👑 كلاش',
            efootball: '⚽ eFootball',
            netflix: '🎬 نتفليكس',
            googleplay: '🛍️ جوجل بلاي',
            tiktok: '🎵 تيك توك',
            ai: '🤖 ذكاء اصطناعي'
        };

        const CATEGORY_ICONS = {
            pubg: 'https://i.ibb.co/Pzxr7M06/IMG.png',
            freefire: 'https://i.ibb.co/JwTt6xQS/IMG.png',
            clash: 'https://i.ibb.co/8DWbJvFL/IMG.png',
            efootball: 'https://i.ibb.co/HfxMcj4T/IMG.png',
            netflix: 'https://i.ibb.co/PsqRGPHR/IMG.png',
            googleplay: 'https://i.ibb.co/cSm7F7Ry/IMG.png',
            tiktok: 'https://i.ibb.co/B2Vhg5Rv/IMG.png',
            ai: 'https://i.ibb.co/8DZGctQM/IMG.png'
        };

        async function loadProducts() {
            try {
                const products = {};
                for (const cat of Object.keys(CATEGORIES)) {
                    const q = query(collection(db, 'products'), where('category', '==', cat));
                    const snap = await getDocs(q);
                    products[cat] = [];
                    snap.forEach(doc => products[cat].push({ id: doc.id, ...doc.data() }));
                }
                return products;
            } catch (error) {
                console.error('Error loading products:', error);
                return {};
            }
        }

        async function renderServices() {
            const grid = document.getElementById('servicesGrid');
            const products = await loadProducts();
            
            grid.innerHTML = Object.keys(CATEGORIES).map(cat => `
                <div class="bg-white rounded-2xl shadow p-4 text-center cursor-pointer hover:shadow-lg transition" onclick="showCategory('${cat}')">
                    <img src="${CATEGORY_ICONS[cat]}" class="w-full h-24 object-contain mb-2">
                    <h3 class="font-bold">${CATEGORIES[cat]}</h3>
                    <p class="text-xs text-gray-500">${(products[cat] || []).length} منتج</p>
                </div>
            `).join('');
        }

        // ============================================
        // دوال المستخدم
        // ============================================
        async function createUserProfile(user, name) {
            const userRef = doc(db, 'users', user.uid);
            const walletID = Math.floor(100000 + Math.random() * 900000).toString();
            await setDoc(userRef, {
                uid: user.uid,
                name: name || user.displayName || 'مستخدم',
                email: user.email,
                walletID: walletID,
                balance: 0,
                isAdmin: user.email === ADMIN_EMAIL,
                createdAt: serverTimestamp()
            });
            return { name: user.displayName || name, walletID };
        }

        async function getUserData(uid) {
            const docSnap = await getDoc(doc(db, 'users', uid));
            if (docSnap.exists()) return { id: uid, ...docSnap.data() };
            return null;
        }

        // ============================================
        // دوال المصادقة
        // ============================================
        function showAuth() {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }

        function showMain() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }

        document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('registerSection').classList.remove('hidden');
        });

        document.getElementById('showLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerSection').classList.add('hidden');
            document.getElementById('authSection').classList.remove('hidden');
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast('✅ تم تسجيل الدخول');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        });

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await createUserProfile(cred.user, name);
                showToast('✅ تم إنشاء الحساب');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        });

        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const userData = await getUserData(result.user.uid);
                if (!userData) await createUserProfile(result.user);
                showToast('✅ تم تسجيل الدخول');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            showToast('👋 تم تسجيل الخروج');
        });

        // ============================================
        // مراقبة حالة المصادقة
        // ============================================
        onAuthStateChanged(auth, async (user) => {
            const loading = document.getElementById('loading');
            const app = document.getElementById('app');

            if (user) {
                const userData = await getUserData(user.uid);
                if (userData) {
                    currentUser = userData;
                    document.getElementById('userName').textContent = userData.name;
                    document.getElementById('userBalance').textContent = userData.balance || 0;

                    if (userData.isAdmin) {
                        document.getElementById('adminPanel').classList.remove('hidden');
                        await loadAdminData();
                    }

                    showMain();
                    await renderServices();
                    await loadUserOrders();
                }
            } else {
                currentUser = null;
                showAuth();
            }

            loading.classList.add('hidden');
            app.classList.remove('hidden');
        });

        // ============================================
        // دوال الأدمن
        // ============================================
        window.loadAdminData = async function() {
            try {
                const usersSnap = await getDocs(collection(db, 'users'));
                document.getElementById('totalUsers').textContent = usersSnap.size;

                const ordersSnap = await getDocs(query(collection(db, 'orders'), where('status', '==', 'قيد الانتظار')));
                document.getElementById('pendingOrders').textContent = ordersSnap.size;
            } catch (error) {
                showToast('❌ خطأ في تحميل البيانات', 'error');
            }
        };

        window.showAddProduct = function() {
            document.getElementById('addProductForm').classList.toggle('hidden');
        };

        window.addNewProduct = async function() {
            const name = document.getElementById('prodName').value;
            const price = parseInt(document.getElementById('prodPrice').value);
            const category = document.getElementById('prodCategory').value;

            if (!name || !price) {
                showToast('❌ أدخل اسم المنتج والسعر', 'error');
                return;
            }

            try {
                const newProduct = {
                    id: category + '_' + Date.now(),
                    name,
                    price,
                    category,
                    createdAt: serverTimestamp()
                };
                await setDoc(doc(db, 'products', newProduct.id), newProduct);
                showToast('✅ تم إضافة المنتج');
                document.getElementById('prodName').value = '';
                document.getElementById('prodPrice').value = '';
                await renderServices();
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
            }
        };

        // ============================================
        // دوال الطلبات
        // ============================================
        async function loadUserOrders() {
            if (!currentUser) return;
            const container = document.getElementById('ordersList');
            try {
                const q = query(collection(db, 'orders'), where('userId', '==', currentUser.uid), orderBy('createdAt', 'desc'));
                const snap = await getDocs(q);
                if (snap.empty) {
                    container.innerHTML = '<p class="text-center text-gray-500">لا توجد طلبات</p>';
                    return;
                }
                container.innerHTML = snap.docs.map(doc => {
                    const o = doc.data();
                    return `
                        <div class="bg-white rounded-2xl shadow p-4">
                            <div class="flex justify-between">
                                <span class="font-bold">${o.product}</span>
                                <span class="text-sm px-2 py-1 rounded-full ${o.status === 'مكتمل' ? 'bg-green-100 text-green-700' : o.status === 'فشل' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}">${o.status}</span>
                            </div>
                            <p class="text-sm text-gray-500">💰 ${o.price} ج.س | 📞 ${o.phone}</p>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        // ============================================
        // عرض الفئات
        // ============================================
        window.showCategory = function(category) {
            showToast('📦 جاري تحميل منتجات ' + CATEGORIES[category]);
            // هتضيف صفحة الفئة هنا
        };

        // ============================================
        // بدء التشغيل
        // ============================================
        console.log('🏝️ مرحباً بك في متجر الواحة!');
        console.log('📧 الأدمن: ' + ADMIN_EMAIL);
    </script>
</body>
</html>
