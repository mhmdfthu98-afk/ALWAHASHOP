<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الواحة | متجر شحن الألعاب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- شاشة التحميل -->
    <div id="loading" class="fixed inset-0 bg-emerald-50 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-gray-600">جاري التحميل...</p>
            <p id="status" class="text-sm text-gray-400 mt-2">جاري الاتصال...</p>
        </div>
    </div>

    <!-- التطبيق -->
    <div id="app" class="hidden">
        <!-- الهيدر -->
        <div class="bg-emerald-600 text-white p-4 text-center">
            <h1 class="text-2xl font-bold">🏝️ الواحة</h1>
            <p class="text-sm">متجر شحن الألعاب</p>
        </div>

        <div class="p-4 max-w-md mx-auto">
            <!-- شاشة تسجيل الدخول -->
            <div id="authBox" class="bg-white rounded-2xl shadow-lg p-6 mt-10">
                <h2 class="text-2xl font-bold text-center text-emerald-700 mb-6">تسجيل الدخول</h2>
                
                <div id="errorBox" class="hidden bg-red-100 text-red-700 p-3 rounded-xl mb-4 text-center text-sm"></div>
                <div id="successBox" class="hidden bg-green-100 text-green-700 p-3 rounded-xl mb-4 text-center text-sm"></div>

                <input id="loginEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-xl mb-3">
                <input id="loginPassword" type="password" placeholder="كلمة المرور" class="w-full p-3 border rounded-xl mb-3">
                
                <button id="loginBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">
                    تسجيل الدخول
                </button>

                <hr class="my-4">

                <button id="googleBtn" class="w-full bg-white border py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-gray-50 transition">
                    <i class="fab fa-google text-red-500"></i> دخول عبر جوجل
                </button>

                <p class="text-center mt-4 text-sm text-gray-500">
                    ليس لديك حساب؟ 
                    <a href="#" id="showRegister" class="text-emerald-600 font-bold">إنشاء حساب</a>
                </p>
            </div>

            <!-- شاشة إنشاء حساب -->
            <div id="registerBox" class="hidden bg-white rounded-2xl shadow-lg p-6 mt-10">
                <h2 class="text-2xl font-bold text-center text-emerald-700 mb-6">إنشاء حساب</h2>

                <input id="regName" type="text" placeholder="الاسم الكامل" class="w-full p-3 border rounded-xl mb-3">
                <input id="regEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-xl mb-3">
                <input id="regPassword" type="password" placeholder="كلمة المرور (6 أحرف على الأقل)" class="w-full p-3 border rounded-xl mb-3">

                <button id="registerBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">
                    إنشاء حساب
                </button>

                <p class="text-center mt-4 text-sm text-gray-500">
                    لديك حساب؟ 
                    <a href="#" id="showLogin" class="text-emerald-600 font-bold">تسجيل الدخول</a>
                </p>
            </div>

            <!-- المحتوى الرئيسي بعد تسجيل الدخول -->
            <div id="mainContent" class="hidden">
                <div class="bg-white rounded-2xl shadow-lg p-4 mb-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-lg" id="userName">...</p>
                        <p class="text-sm text-gray-500">💰 الرصيد: <span id="userBalance" class="text-emerald-600 font-bold">0</span> ج.س</p>
                        <p class="text-xs text-gray-400">#<span id="userWallet">000000</span></p>
                    </div>
                    <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm hover:bg-red-600 transition">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>

                <div id="adminPanel" class="hidden bg-white rounded-2xl shadow-lg p-4 mb-4">
                    <h3 class="font-bold text-emerald-700 mb-2">👑 لوحة الأدمن</h3>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div class="bg-gray-50 p-2 rounded-lg text-center">
                            <p class="text-gray-500">المستخدمين</p>
                            <p class="font-bold text-emerald-600" id="totalUsers">0</p>
                        </div>
                        <div class="bg-gray-50 p-2 rounded-lg text-center">
                            <p class="text-gray-500">طلبات معلقة</p>
                            <p class="font-bold text-emerald-600" id="pendingOrders">0</p>
                        </div>
                    </div>
                </div>

                <div id="ordersList" class="space-y-3">
                    <p class="text-center text-gray-500">لا توجد طلبات</p>
                </div>

                <button id="testBtn" class="w-full mt-4 bg-blue-500 text-white py-2 rounded-xl">اختبار الاتصال</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================
        // Firebase Setup
        // ============================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, doc, setDoc, getDoc, getDocs,
            query, where, orderBy, onSnapshot, increment, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBiIhF2PrNIhEZA4RO235F-3Y1nmIJiMOs",
            authDomain: "oasis-store-87d2d.firebaseapp.com",
            projectId: "oasis-store-87d2d",
            storageBucket: "oasis-store-87d2d.firebasestorage.app",
            messagingSenderId: "128718200720",
            appId: "1:128718200720:web:a90e330c428cac1db2dd15"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const ADMIN_EMAIL = 'mhmdfthu98@gmail.com';
        let currentUser = null;

        // ============================================
        // دوال مساعدة
        // ============================================
        function showToast(msg, type = 'success') {
            const box = document.getElementById(type === 'error' ? 'errorBox' : 'successBox');
            box.textContent = msg;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 4000);
        }

        function updateStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        // ============================================
        // دوال المستخدم
        // ============================================
        async function createUserProfile(user, name) {
            const walletID = Math.floor(100000 + Math.random() * 900000).toString();
            await setDoc(doc(db, 'users', user.uid), {
                uid: user.uid,
                name: name || user.displayName || 'مستخدم',
                email: user.email,
                walletID: walletID,
                balance: 0,
                isAdmin: user.email === ADMIN_EMAIL,
                createdAt: serverTimestamp()
            });
            return walletID;
        }

        async function getUserData(uid) {
            const snap = await getDoc(doc(db, 'users', uid));
            if (snap.exists()) return { id: uid, ...snap.data() };
            return null;
        }

        // ============================================
        // دوال المصادقة
        // ============================================
        function showAuth() {
            document.getElementById('authBox').classList.remove('hidden');
            document.getElementById('registerBox').classList.add('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }

        function showMain() {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('registerBox').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }

        // تبديل الشاشات
        document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('registerBox').classList.remove('hidden');
        });

        document.getElementById('showLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerBox').classList.add('hidden');
            document.getElementById('authBox').classList.remove('hidden');
        });

        // تسجيل الدخول
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showToast('❌ أدخل البريد الإلكتروني وكلمة المرور', 'error');
                return;
            }

            try {
                updateStatus('🔄 جاري تسجيل الدخول...');
                await signInWithEmailAndPassword(auth, email, password);
                showToast('✅ تم تسجيل الدخول بنجاح!');
                updateStatus('✅ تم تسجيل الدخول');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
                updateStatus('❌ فشل تسجيل الدخول');
                console.error('Login error:', error);
            }
        });

        // إنشاء حساب
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !password) {
                showToast('❌ جميع الحقول مطلوبة', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }

            try {
                updateStatus('🔄 جاري إنشاء الحساب...');
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await createUserProfile(cred.user, name);
                showToast('✅ تم إنشاء الحساب بنجاح!');
                updateStatus('✅ تم إنشاء الحساب');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
                updateStatus('❌ فشل إنشاء الحساب');
                console.error('Register error:', error);
            }
        });

        // تسجيل دخول بجوجل
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                updateStatus('🔄 جاري تسجيل الدخول بجوجل...');
                const result = await signInWithPopup(auth, provider);
                const userData = await getUserData(result.user.uid);
                if (!userData) {
                    await createUserProfile(result.user);
                }
                showToast('✅ تم تسجيل الدخول بنجاح!');
                updateStatus('✅ تم تسجيل الدخول');
            } catch (error) {
                showToast('❌ ' + error.message, 'error');
                updateStatus('❌ فشل تسجيل الدخول');
                console.error('Google login error:', error);
            }
        });

        // تسجيل الخروج
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            showToast('👋 تم تسجيل الخروج');
        });

        // ============================================
        // تحميل بيانات المستخدم
        // ============================================
        async function loadUserData(user) {
            const userData = await getUserData(user.uid);
            if (!userData) return null;

            currentUser = userData;
            document.getElementById('userName').textContent = userData.name;
            document.getElementById('userBalance').textContent = userData.balance || 0;
            document.getElementById('userWallet').textContent = userData.walletID || '000000';

            // لوحة الأدمن
            if (userData.isAdmin) {
                document.getElementById('adminPanel').classList.remove('hidden');
                await loadAdminStats();
            }

            // تحميل الطلبات
            await loadOrders(user.uid);

            return userData;
        }

        // ============================================
        // تحميل الطلبات
        // ============================================
        async function loadOrders(uid) {
            const container = document.getElementById('ordersList');
            try {
                const q = query(
                    collection(db, 'orders'),
                    where('userId', '==', uid),
                    orderBy('createdAt', 'desc')
                );
                const snap = await getDocs(q);

                if (snap.empty) {
                    container.innerHTML = '<p class="text-center text-gray-500">📭 لا توجد طلبات</p>';
                    return;
                }

                container.innerHTML = snap.docs.map(doc => {
                    const o = doc.data();
                    const statusColor = o.status === 'مكتمل' ? 'bg-green-100 text-green-700' :
                                      o.status === 'فشل' ? 'bg-red-100 text-red-700' :
                                      'bg-yellow-100 text-yellow-700';
                    return `
                        <div class="bg-white rounded-2xl shadow p-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-bold">${o.product}</p>
                                    <p class="text-sm text-gray-500">🆔 ${o.gameID || '---'}</p>
                                </div>
                                <span class="text-xs px-3 py-1 rounded-full ${statusColor}">${o.status || 'قيد الانتظار'}</span>
                            </div>
                            <div class="flex justify-between mt-2 text-sm">
                                <span class="text-gray-600">💰 ${o.price || 0} ج.س</span>
                                <span class="text-gray-400">📞 ${o.phone || '---'}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading orders:', error);
                container.innerHTML = '<p class="text-center text-red-500">⚠️ خطأ في تحميل الطلبات</p>';
            }
        }

        // ============================================
        // إحصائيات الأدمن
        // ============================================
        async function loadAdminStats() {
            try {
                const usersSnap = await getDocs(collection(db, 'users'));
                document.getElementById('totalUsers').textContent = usersSnap.size;

                const ordersSnap = await getDocs(query(
                    collection(db, 'orders'),
                    where('status', '==', 'قيد الانتظار')
                ));
                document.getElementById('pendingOrders').textContent = ordersSnap.size;
            } catch (error) {
                console.error('Error loading admin stats:', error);
            }
        }

        // ============================================
        // زر الاختبار
        // ============================================
        document.getElementById('testBtn').addEventListener('click', async () => {
            try {
                const testRef = doc(db, 'test', 'test');
                await setDoc(testRef, { test: true, time: serverTimestamp() });
                showToast('✅ الاتصال بقاعدة البيانات يعمل!');
            } catch (error) {
                showToast('❌ خطأ في الاتصال: ' + error.message, 'error');
                console.error('Test error:', error);
            }
        });

        // ============================================
        // مراقبة حالة المصادقة
        // ============================================
        onAuthStateChanged(auth, async (user) => {
            const loading = document.getElementById('loading');
            const app = document.getElementById('app');

            if (user) {
                updateStatus('🔄 جاري تحميل البيانات...');
                await loadUserData(user);
                showMain();
                updateStatus('✅ مرحباً بك!');
            } else {
                currentUser = null;
                showAuth();
                updateStatus('✅ جاهز لتسجيل الدخول');
            }

            loading.classList.add('hidden');
            app.classList.remove('hidden');
        });

        // ============================================
        // بدء التشغيل
        // ============================================
        console.log('🏝️ متجر الواحة');
        console.log('📧 الأدمن: ' + ADMIN_EMAIL);
        updateStatus('🔄 جاري التهيئة...');
    </script>
</body>
</html>
