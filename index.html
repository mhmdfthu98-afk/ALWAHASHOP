<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الواحة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<!-- ====== شاشة التحميل ====== -->
<div id="loading" class="fixed inset-0 bg-emerald-50 flex items-center justify-center z-50">
    <div class="text-center">
        <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p id="status" class="mt-4 text-gray-600 font-bold">جاري التحميل...</p>
    </div>
</div>

<!-- ====== تسجيل الدخول ====== -->
<div id="auth" class="hidden max-w-sm mx-auto mt-20 p-6 bg-white rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-emerald-700 text-center">🏝️ الواحة</h2>
    <p class="text-center text-gray-400 text-sm mb-4">متجر شحن الألعاب</p>
    <div id="msg" class="hidden text-center text-sm p-2 rounded-xl mb-2"></div>
    <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-xl mb-3">
    <input id="pass" type="password" placeholder="كلمة المرور" class="w-full p-3 border rounded-xl mb-3">
    <button id="loginBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700">دخول</button>
    <hr class="my-3">
    <button id="googleBtn" class="w-full bg-white border py-3 rounded-xl font-bold hover:bg-gray-50 flex items-center justify-center gap-2">
        <span class="text-red-500 font-bold">G</span> دخول بجوجل
    </button>
    <p class="text-center mt-3 text-sm">
        <a href="#" id="showReg" class="text-emerald-600 font-bold">إنشاء حساب</a>
    </p>
</div>

<!-- ====== إنشاء حساب ====== -->
<div id="register" class="hidden max-w-sm mx-auto mt-20 p-6 bg-white rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-emerald-700 text-center">🏝️ حساب جديد</h2>
    <input id="regName" type="text" placeholder="الاسم الكامل" class="w-full p-3 border rounded-xl mb-3">
    <input id="regEmail" type="email" placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-xl mb-3">
    <input id="regPass" type="password" placeholder="كلمة المرور (6 أحرف)" class="w-full p-3 border rounded-xl mb-3">
    <button id="regBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700">إنشاء</button>
    <p class="text-center mt-3 text-sm">
        <a href="#" id="showLogin" class="text-emerald-600 font-bold">تسجيل دخول</a>
    </p>
</div>

<!-- ====== الرئيسية ====== -->
<div id="main" class="hidden">
    <div class="bg-emerald-600 text-white p-4 text-center">
        <h1 class="text-2xl font-bold">🏝️ الواحة</h1>
        <p class="text-sm text-emerald-200">لشحن الألعاب</p>
    </div>
    <div class="p-4 max-w-2xl mx-auto">
        <div class="bg-white rounded-2xl shadow p-4 mb-4 flex justify-between items-center">
            <div>
                <p class="font-bold" id="userName">...</p>
                <p class="text-sm">💰 <span id="balance">0</span> ج.س</p>
                <p class="text-xs text-gray-400">#<span id="walletId">000000</span></p>
            </div>
            <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm hover:bg-red-600">خروج</button>
        </div>
        <div id="ordersList" class="space-y-3"></div>
        <p class="text-center text-gray-400 text-sm mt-4">© 2025 الواحة</p>
    </div>
</div>

<script type="module">
    // ============================================================
    // 🔥 Firebase
    // ============================================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
        getFirestore,
        doc, setDoc, getDoc,
        collection, query, where, getDocs,
        orderBy, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        signInWithPopup,
        GoogleAuthProvider,
        onAuthStateChanged,
        signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ============================================================
    // 📋 الإعدادات
    // ============================================================
    const config = {
        apiKey: "AIzaSyBiIhF2PrNIhEZA4RO235F-3Y1nmIJiMOs",
        authDomain: "oasis-store-87d2d.firebaseapp.com",
        projectId: "oasis-store-87d2d",
        storageBucket: "oasis-store-87d2d.firebasestorage.app",
        messagingSenderId: "128718200720",
        appId: "1:128718200720:web:a90e330c428cac1db2dd15"
    };

    // ============================================================
    // 🚀 التهيئة
    // ============================================================
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    console.log('✅ Firebase initialized');

    // ============================================================
    // 📦 العناصر
    // ============================================================
    const loading = document.getElementById('loading');
    const status = document.getElementById('status');
    let currentUser = null;

    function showToast(msg, isError = false) {
        const el = document.createElement('div');
        el.className = `fixed bottom-20 right-4 p-4 rounded-xl text-white z-50 ${isError ? 'bg-red-500' : 'bg-emerald-500'}`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    function showAuth() {
        document.getElementById('auth').classList.remove('hidden');
        document.getElementById('register').classList.add('hidden');
        document.getElementById('main').classList.add('hidden');
    }

    function showRegister() {
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('register').classList.remove('hidden');
        document.getElementById('main').classList.add('hidden');
    }

    function showMain() {
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('register').classList.add('hidden');
        document.getElementById('main').classList.remove('hidden');
    }

    // ============================================================
    // 👤 دوال المستخدم
    // ============================================================
    async function createUserProfile(user, name) {
        const walletID = Math.floor(100000 + Math.random() * 900000).toString();
        await setDoc(doc(db, 'users', user.uid), {
            uid: user.uid,
            name: name || user.displayName || 'مستخدم',
            email: user.email,
            walletID: walletID,
            balance: 0,
            isAdmin: user.email === 'mhmdfthu98@gmail.com',
            createdAt: serverTimestamp()
        });
        return walletID;
    }

    async function getUserData(uid) {
        const snap = await getDoc(doc(db, 'users', uid));
        if (snap.exists()) return { id: uid, ...snap.data() };
        return null;
    }

    // ============================================================
    // 📋 تحميل الطلبات
    // ============================================================
    async function loadOrders(uid) {
        const container = document.getElementById('ordersList');
        try {
            const q = query(
                collection(db, 'orders'),
                where('userId', '==', uid),
                orderBy('createdAt', 'desc')
            );
            const snap = await getDocs(q);

            if (snap.empty) {
                container.innerHTML = '<p class="text-center text-gray-400">📭 لا توجد طلبات</p>';
                return;
            }

            container.innerHTML = snap.docs.map(d => {
                const o = d.data();
                return `
                    <div class="bg-white rounded-2xl shadow p-4">
                        <div class="flex justify-between">
                            <span class="font-bold">${o.product || 'منتج'}</span>
                            <span class="text-sm ${o.status === 'مكتمل' ? 'text-green-600' : 'text-yellow-600'}">${o.status || 'قيد الانتظار'}</span>
                        </div>
                        <p class="text-sm text-gray-500">💰 ${o.price || 0} ج.س</p>
                        <p class="text-xs text-gray-400">📞 ${o.phone || ''}</p>
                    </div>
                `;
            }).join('');
        } catch (error) {
            console.error('Error loading orders:', error);
            container.innerHTML = '<p class="text-center text-red-500">⚠️ خطأ في تحميل الطلبات</p>';
        }
    }

    // ============================================================
    // 📱 تحميل بيانات المستخدم
    // ============================================================
    async function loadUserData(user) {
        const userData = await getUserData(user.uid);
        if (!userData) return null;

        currentUser = userData;
        document.getElementById('userName').textContent = userData.name;
        document.getElementById('balance').textContent = userData.balance || 0;
        document.getElementById('walletId').textContent = userData.walletID || '000000';

        await loadOrders(user.uid);
        return userData;
    }

    // ============================================================
    // 🔐 أحداث المصادقة
    // ============================================================
    document.getElementById('showReg').addEventListener('click', (e) => {
        e.preventDefault();
        showRegister();
    });

    document.getElementById('showLogin').addEventListener('click', (e) => {
        e.preventDefault();
        showAuth();
    });

    // تسجيل الدخول
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if (!email || !pass) {
            showToast('أدخل البريد وكلمة المرور', true);
            return;
        }
        try {
            status.textContent = '🔄 جاري الدخول...';
            await signInWithEmailAndPassword(auth, email, pass);
            status.textContent = '✅ تم الدخول';
            showToast('✅ تم تسجيل الدخول');
        } catch (e) {
            status.textContent = '❌ ' + e.message;
            showToast(e.message, true);
        }
    });

    // إنشاء حساب
    document.getElementById('regBtn').addEventListener('click', async () => {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        if (!name || !email || !pass) {
            showToast('جميع الحقول مطلوبة', true);
            return;
        }
        if (pass.length < 6) {
            showToast('كلمة المرور 6 أحرف على الأقل', true);
            return;
        }
        try {
            status.textContent = '🔄 جاري إنشاء الحساب...';
            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            await createUserProfile(cred.user, name);
            status.textContent = '✅ تم إنشاء الحساب';
            showToast('✅ تم إنشاء الحساب');
        } catch (e) {
            status.textContent = '❌ ' + e.message;
            showToast(e.message, true);
        }
    });

    // جوجل
    document.getElementById('googleBtn').addEventListener('click', async () => {
        try {
            status.textContent = '🔄 جاري الدخول بجوجل...';
            const result = await signInWithPopup(auth, provider);
            const userData = await getUserData(result.user.uid);
            if (!userData) {
                await createUserProfile(result.user);
            }
            status.textContent = '✅ تم الدخول';
            showToast('✅ تم تسجيل الدخول');
        } catch (e) {
            status.textContent = '❌ ' + e.message;
            showToast(e.message, true);
        }
    });

    // خروج
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await signOut(auth);
        showToast('👋 تم الخروج');
    });

    // ============================================================
    // 👀 مراقبة المصادقة
    // ============================================================
    status.textContent = '🔄 جاري الاتصال...';

    // اختبار الاتصال
    try {
        await setDoc(doc(db, 'test', 'test'), { time: new Date().toISOString() });
        status.textContent = '✅ Firebase متصل';
        console.log('✅ Firebase connection successful');
    } catch (e) {
        status.textContent = '⚠️ خطأ في الاتصال: ' + e.message;
        console.error('❌ Firebase connection error:', e);
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            status.textContent = '🔄 جاري التحميل...';
            await loadUserData(user);
            showMain();
            status.textContent = '✅ مرحباً!';
        } else {
            showAuth();
            status.textContent = '🔓 جاهز لتسجيل الدخول';
        }
        loading.classList.add('hidden');
    });

    status.textContent = '✅ جاهز';
    console.log('🏝️ الواحة جاهزة!');
</script>
</body>
</html>
