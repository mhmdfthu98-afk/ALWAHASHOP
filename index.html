<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الواحة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="loading" class="fixed inset-0 bg-emerald-50 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p id="status" class="text-gray-600 font-bold">جاري التحميل...</p>
            <p id="status2" class="text-sm text-gray-400 mt-2">...</p>
        </div>
    </div>

    <!-- تسجيل الدخول -->
    <div id="auth" class="hidden max-w-md mx-auto mt-20 p-6 bg-white rounded-2xl shadow-lg">
        <h2 class="text-2xl font-bold text-emerald-700 text-center mb-6">🏝️ الواحة</h2>
        <div id="msg" class="hidden p-3 rounded-xl mb-3 text-center text-sm"></div>
        <input id="email" type="email" placeholder="البريد" class="w-full p-3 border rounded-xl mb-3">
        <input id="pass" type="password" placeholder="كلمة المرور" class="w-full p-3 border rounded-xl mb-3">
        <button id="loginBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">دخول</button>
        <hr class="my-3">
        <button id="googleBtn" class="w-full bg-white border py-3 rounded-xl font-bold">دخول بجوجل</button>
        <p class="text-center mt-3 text-sm">
            <a href="#" id="showReg" class="text-emerald-600 font-bold">إنشاء حساب</a>
        </p>
    </div>

    <!-- إنشاء حساب -->
    <div id="register" class="hidden max-w-md mx-auto mt-20 p-6 bg-white rounded-2xl shadow-lg">
        <h2 class="text-2xl font-bold text-emerald-700 text-center mb-6">🏝️ إنشاء حساب</h2>
        <input id="regName" type="text" placeholder="الاسم" class="w-full p-3 border rounded-xl mb-3">
        <input id="regEmail" type="email" placeholder="البريد" class="w-full p-3 border rounded-xl mb-3">
        <input id="regPass" type="password" placeholder="كلمة المرور" class="w-full p-3 border rounded-xl mb-3">
        <button id="regBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">إنشاء</button>
        <p class="text-center mt-3 text-sm">
            <a href="#" id="showLogin" class="text-emerald-600 font-bold">تسجيل دخول</a>
        </p>
    </div>

    <!-- الرئيسية -->
    <div id="main" class="hidden">
        <div class="bg-emerald-600 text-white p-4 text-center">
            <h1 class="text-2xl font-bold">🏝️ الواحة</h1>
        </div>
        <div class="p-4 max-w-6xl mx-auto">
            <div class="bg-white rounded-2xl shadow-lg p-4 mb-4 flex justify-between">
                <div>
                    <p class="font-bold" id="userName">...</p>
                    <p class="text-sm">💰 <span id="balance">0</span> ج.س</p>
                </div>
                <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm">خروج</button>
            </div>
            <div id="orders" class="space-y-3"></div>
        </div>
    </div>

    <script type="module">
        // ============================================
        // استيراد Firebase
        // ============================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ============================================
        // الإعدادات
        // ============================================
        const config = {
            apiKey: "AIzaSyBiIhF2PrNIhEZA4RO235F-3Y1nmIJiMOs",
            authDomain: "oasis-store-87d2d.firebaseapp.com",
            projectId: "oasis-store-87d2d",
            storageBucket: "oasis-store-87d2d.firebasestorage.app",
            messagingSenderId: "128718200720",
            appId: "1:128718200720:web:a90e330c428cac1db2dd15"
        };

        const app = initializeApp(config);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ============================================
        // عناصر
        // ============================================
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');
        const status2 = document.getElementById('status2');

        function setStatus(text, text2 = '') {
            status.textContent = text;
            status2.textContent = text2;
            console.log(text, text2);
        }

        function showToast(msg, color = 'green') {
            const div = document.createElement('div');
            div.className = `fixed bottom-20 right-4 p-4 rounded-xl shadow-lg z-50 ${color === 'red' ? 'bg-red-500' : 'bg-emerald-500'} text-white`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // ============================================
        // شاشات
        // ============================================
        function showAuth() {
            document.getElementById('auth').classList.remove('hidden');
            document.getElementById('register').classList.add('hidden');
            document.getElementById('main').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('auth').classList.add('hidden');
            document.getElementById('register').classList.remove('hidden');
            document.getElementById('main').classList.add('hidden');
        }

        function showMain() {
            document.getElementById('auth').classList.add('hidden');
            document.getElementById('register').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
        }

        // ============================================
        // أحداث
        // ============================================
        document.getElementById('showReg').addEventListener('click', (e) => { e.preventDefault();
            showRegister(); });
        document.getElementById('showLogin').addEventListener('click', (e) => { e.preventDefault();
            showAuth(); });

        // تسجيل الدخول
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if (!email || !pass) { showToast('أدخل البريد وكلمة المرور', 'red'); return; }
            try {
                setStatus('جاري تسجيل الدخول...');
                await signInWithEmailAndPassword(auth, email, pass);
                setStatus('تم تسجيل الدخول ✅');
                showToast('✅ تم تسجيل الدخول');
            } catch (e) {
                setStatus('❌ فشل: ' + e.message);
                showToast(e.message, 'red');
            }
        });

        // إنشاء حساب
        document.getElementById('regBtn').addEventListener('click', async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            if (!name || !email || !pass) { showToast('جميع الحقول مطلوبة', 'red'); return; }
            if (pass.length < 6) { showToast('كلمة المرور 6 أحرف على الأقل', 'red'); return; }
            try {
                setStatus('جاري إنشاء الحساب...');
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                const wallet = Math.floor(100000 + Math.random() * 900000);
                await setDoc(doc(db, 'users', cred.user.uid), {
                    uid: cred.user.uid,
                    name: name,
                    email: email,
                    walletID: wallet,
                    balance: 0,
                    isAdmin: email === 'mhmdfthu98@gmail.com',
                    createdAt: serverTimestamp()
                });
                setStatus('✅ تم إنشاء الحساب');
                showToast('✅ تم إنشاء الحساب');
            } catch (e) {
                setStatus('❌ فشل: ' + e.message);
                showToast(e.message, 'red');
            }
        });

        // جوجل
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                setStatus('جاري تسجيل الدخول بجوجل...');
                const result = await signInWithPopup(auth, provider);
                const snap = await getDoc(doc(db, 'users', result.user.uid));
                if (!snap.exists()) {
                    const wallet = Math.floor(100000 + Math.random() * 900000);
                    await setDoc(doc(db, 'users', result.user.uid), {
                        uid: result.user.uid,
                        name: result.user.displayName || 'مستخدم',
                        email: result.user.email,
                        walletID: wallet,
                        balance: 0,
                        isAdmin: result.user.email === 'mhmdfthu98@gmail.com',
                        createdAt: serverTimestamp()
                    });
                }
                setStatus('✅ تم تسجيل الدخول');
                showToast('✅ تم تسجيل الدخول');
            } catch (e) {
                setStatus('❌ فشل: ' + e.message);
                showToast(e.message, 'red');
            }
        });

        // خروج
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            showToast('👋 تم الخروج');
        });

        // ============================================
        // تحميل البيانات
        // ============================================
        async function loadUserData(uid) {
            try {
                const snap = await getDoc(doc(db, 'users', uid));
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('userName').textContent = data.name;
                    document.getElementById('balance').textContent = data.balance || 0;

                    // تحميل الطلبات
                    const q = query(collection(db, 'orders'), where('userId', '==', uid), orderBy('createdAt', 'desc'));
                    const ordersSnap = await getDocs(q);
                    const container = document.getElementById('orders');
                    if (ordersSnap.empty) {
                        container.innerHTML = '<p class="text-center text-gray-400">📭 لا توجد طلبات</p>';
                    } else {
                        container.innerHTML = ordersSnap.docs.map(d => {
                            const o = d.data();
                            return `
                                <div class="bg-white rounded-2xl shadow p-4">
                                    <div class="flex justify-between">
                                        <span class="font-bold">${o.product || 'منتج'}</span>
                                        <span class="text-sm ${o.status === 'مكتمل' ? 'text-green-600' : 'text-yellow-600'}">${o.status || 'قيد الانتظار'}</span>
                                    </div>
                                    <p class="text-sm text-gray-500">💰 ${o.price || 0} ج.س</p>
                                </div>
                            `;
                        }).join('');
                    }
                    return data;
                }
                return null;
            } catch (e) {
                console.error('Error loading user data:', e);
                return null;
            }
        }

        // ============================================
        // مراقبة المصادقة
        // ============================================
        setStatus('🔄 جاري الاتصال بـ Firebase...');

        // اختبار الاتصال
        try {
            const testRef = doc(db, 'test', 'test');
            await setDoc(testRef, { test: true, time: new Date().toISOString() });
            setStatus('✅ Firebase متصل');
        } catch (e) {
            setStatus('⚠️ Firebase غير متصل: ' + e.message);
            console.error(e);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                setStatus('🔄 جاري تحميل البيانات...');
                await loadUserData(user.uid);
                showMain();
                setStatus('✅ مرحباً!');
            } else {
                showAuth();
                setStatus('🔓 جاهز لتسجيل الدخول');
            }

            // إخفاء التحميل
            loading.classList.add('hidden');
        });

        setStatus('✅ جاهز');
    </script>
</body>
</html>
